
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Assessment Portal</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .option-btn:hover {
      transform: translateY(-1px);
    }

    .option-btn:active {
      transform: translateY(1px);
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex justify-center items-center p-4">

<div class="bg-white shadow-xl rounded-2xl w-full max-w-2xl p-8">

  <!-- START SCREEN -->
  <div id="start-screen" class="text-center">

    <h1 class="text-3xl font-bold mb-4 text-slate-800">
      Online Assessment
    </h1>

    <p class="text-slate-500 mb-8">
      +1 for correct answer<br>
      -0.25 for wrong answer
    </p>

    <button
      id="start-btn"
      class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold cursor-pointer"
    >
      Start Test
    </button>

  </div>
  <!-- TEST SELECTION SCREEN -->
<div id="test-select-screen" class="hidden text-center">

  <h2 class="text-2xl font-bold mb-6 text-slate-800">
    Choose Test
  </h2>

  <div
    id="test-list"
    class="space-y-3"
  ></div>

</div>

  <!-- LOADING -->
  <div id="loading-screen" class="hidden text-center py-10">

    <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto mb-4"></div>

    <p class="text-slate-600">
      Loading Questions...
    </p>

  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="hidden">
          <h3
        id="test-title"
        class="text-lg font-bold mb-4 text-blue-600"
      ></h3>

    <div class="flex justify-between mb-4">

      <span id="progress-text" class="font-semibold text-sm"></span>

      <span id="score-preview" class="font-semibold text-sm">
        Score: 0
      </span>

    </div>

    <div class="w-full bg-slate-200 h-2 rounded-full mb-6">
      <div
        id="progress-bar"
        class="bg-blue-600 h-2 rounded-full"
        style="width:0%"
      ></div>
    </div>

    <h2
      id="question-text"
      class="text-xl font-bold mb-6 text-slate-800"
    ></h2>

    <div id="options-container" class="space-y-3"></div>

  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="hidden">

    <h2 class="text-3xl font-bold text-center mb-4 text-slate-800">
      Test Completed
    </h2>

    <div class="text-center mb-6">

      <div class="text-lg text-slate-500 mb-2">
        Final Score
      </div>

      <div
        id="final-score"
        class="text-5xl font-bold text-blue-600"
      >
        0
      </div>

    </div>

    <div id="breakdown-list" class="space-y-4 mb-6"></div>

    <button
      id="email-btn"
      class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-semibold"
    >
      Send PDF Report
    </button>

  </div>

</div>

<script>

// const CSV_URL =
// "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOga_DjrMlh5t1DgyLWs1nGhZYGhvMd7BX3yEV7KPAdp52bmfRh0h6VrWMGIZakpS3NnEW64xrMlif/pub?output=csv";

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw_Hiksly66sMSt6MCawiSX0vLkPnV4qTnihNk6ZiVLYyBnZq8U0QU_jUXls0wMubIh9Q/exec";

  const SHEET_ID =
"18kiCNNP98ihdWZmQxVNZe9MXaZFkNChknKa1-kDGVCo";

let questions = [];
let currentIndex = 0;
let score = 0;
let answers = [];
let selectedSheet = "";

// DOM
const startScreen = document.getElementById("start-screen");
const loadingScreen = document.getElementById("loading-screen");
const quizScreen = document.getElementById("quiz-screen");
const resultScreen = document.getElementById("result-screen");

document
.getElementById("start-btn")
.addEventListener("click", loadSheetOptions);

document
.getElementById("email-btn")
.addEventListener("click", sendEmailResults);
async function loadSheetOptions() {

  startScreen.classList.add("hidden");

  const testScreen =
  document.getElementById("test-select-screen");

  testScreen.classList.remove("hidden");

  const container =
  document.getElementById("test-list");

  container.innerHTML = "";

  // Add your sheet names here
  // EXACTLY same as spreadsheet tab names

  const sheets = [
    "Budget",
    "Economic Survey",
  ];

  sheets.forEach(sheet => {

    const btn =
    document.createElement("button");

    btn.className =
    "w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold";

    btn.innerText = sheet;

    btn.onclick = () => {

      selectedSheet = sheet;

      startTest();
    };

    container.appendChild(btn);

  });

}
  
async function startTest() {

  startScreen.classList.add("hidden");
  loadingScreen.classList.remove("hidden");

  try {

    document
    .getElementById("test-select-screen")
    .classList.add("hidden");
    
    const csvUrl =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(selectedSheet)}`;
    
    const response =
    await fetch(csvUrl);
    const csvText = await response.text();

    Papa.parse(csvText, {

      header: false,
      skipEmptyLines: true,

      complete: function(results) {

        const data = results.data;

        questions = [];

        for (let i = 0; i < data.length; i++) {

          const row = data[i];
          console.log(i, row);


          questions.push({

            q: row[0],
            options: [
              row[1],
              row[2],
              row[3],
              row[4]
            ],

            correct: row[5]

          });

        }

        loadingScreen.classList.add("hidden");
        quizScreen.classList.remove("hidden");

        showQuestion();

      }

    });

  } catch (error) {

    console.error(error);

    alert("Failed to load questions.");

    loadingScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");

  }

}

function shuffle(array) {

  for (let i = array.length - 1; i > 0; i--) {

    const j = Math.floor(Math.random() * (i + 1));

    [array[i], array[j]] =
    [array[j], array[i]];
  }

  return array;
}

function showQuestion() {

  const current = questions[currentIndex];
  document.getElementById("test-title").innerText =
selectedSheet;

  document.getElementById("progress-text").innerText =
  `Question ${currentIndex + 1} of ${questions.length}`;

  document.getElementById("score-preview").innerText =
  `Score: ${score.toFixed(2)}`;

  document.getElementById("progress-bar").style.width =
  `${(currentIndex / questions.length) * 100}%`;

  document.getElementById("question-text").innerText =
  current.q;

  const container =
  document.getElementById("options-container");

  container.innerHTML = "";

  let options = [...current.options];

  options = shuffle(options);

  options.forEach(option => {

    const btn = document.createElement("button");

    btn.className =
    "option-btn w-full p-4 border rounded-xl text-left hover:bg-blue-50 hover:border-blue-500";

    btn.innerText = option;

    btn.onclick = () =>
    handleAnswer(option, current.correct);

    container.appendChild(btn);

  });

}

function handleAnswer(selected, correct) {

  const isCorrect =
  selected.trim().toLowerCase() ===
  correct.trim().toLowerCase();

  if (isCorrect) {
    score += 1;
  } else {
    score -= 0.25;
  }

  answers.push({

    question:
    questions[currentIndex].q,

    selected,
    correct,
    isCorrect

  });

  currentIndex++;

  if (currentIndex < questions.length) {

    showQuestion();

  } else {

    showResults();

  }

}

function showResults() {

  quizScreen.classList.add("hidden");

  resultScreen.classList.remove("hidden");

  document.getElementById("final-score").innerText =
  score.toFixed(2);

  const list =
  document.getElementById("breakdown-list");

  list.innerHTML = "";

  answers.forEach((item, index) => {

    const div = document.createElement("div");

    div.className =
    `p-4 rounded-xl border ${
      item.isCorrect
      ? "bg-green-50 border-green-200"
      : "bg-red-50 border-red-200"
    }`;

    div.innerHTML = `
      <p class="font-semibold">
        ${index + 1}. ${item.question}
      </p>

      <p>
        Your Answer:
        <strong>${item.selected}</strong>
      </p>

      <p>
        Correct Answer:
        <strong>${item.correct}</strong>
      </p>
    `;

    list.appendChild(div);

  });

}
  
async function sendEmailResults() {

    const btn = document.getElementById("email-btn");

    btn.disabled = true;
    btn.innerText = "Generating PDF...";

    try {

        const { jsPDF } = window.jspdf;

        const doc = new jsPDF({
            unit: "mm",
            format: "a4"
        });

        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();

        const margin = 15;
        const maxWidth = pageWidth - (margin * 2);

        // =========================
        // HEADER
        // =========================

        doc.setFillColor(15, 23, 42);
        doc.rect(0, 0, pageWidth, 35, "F");

        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.setFont(undefined, "bold");

        doc.text("Assessment Report", margin, 20);

        doc.setFontSize(12);

        doc.text(
            `Final Score: ${score.toFixed(2)}`,
            margin,
            28
        );

        let y = 50;

        // =========================
        // ANSWERS
        // =========================

        answers.forEach((item, index) => {

            // Add page if needed
            if (y > 250) {

                doc.addPage();

                y = 20;
            }

            // Card background
            doc.setFillColor(248, 250, 252);

            doc.roundedRect(
                margin,
                y - 5,
                maxWidth,
                42,
                3,
                3,
                "F"
            );

            // Question Number
            doc.setTextColor(15, 23, 42);

            doc.setFontSize(13);

            doc.setFont(undefined, "bold");

            doc.text(
                `Question ${index + 1}`,
                margin + 4,
                y + 2
            );

            y += 8;

            // Question Text
            doc.setFontSize(11);

            doc.setFont(undefined, "normal");

            const questionLines =
            doc.splitTextToSize(
                item.question,
                maxWidth - 8
            );

            doc.text(
                questionLines,
                margin + 4,
                y
            );

            y += (questionLines.length * 6);

            // Correct Answer
            doc.setFont(undefined, "bold");

            doc.setTextColor(22, 163, 74);

            const correctLines =
            doc.splitTextToSize(
                `Correct Answer: ${item.correct}`,
                maxWidth - 8
            );

            doc.text(
                correctLines,
                margin + 4,
                y
            );

            y += (correctLines.length * 6);

            // User Answer
            if (item.isCorrect) {

                doc.setTextColor(22, 163, 74);

            } else {

                doc.setTextColor(220, 38, 38);

            }

            const answerLines =
            doc.splitTextToSize(
                `Your Answer: ${item.selected}`,
                maxWidth - 8
            );

            doc.text(
                answerLines,
                margin + 4,
                y
            );

            y += (answerLines.length * 6);

            // Status Badge
            if (item.isCorrect) {

                doc.setFillColor(220, 252, 231);

                doc.roundedRect(
                    margin + 4,
                    y,
                    28,
                    8,
                    2,
                    2,
                    "F"
                );

                doc.setTextColor(22, 163, 74);

                doc.setFontSize(10);

                doc.setFont(undefined, "bold");

                doc.text(
                    "CORRECT",
                    margin + 8,
                    y + 5
                );

            } else {

                doc.setFillColor(254, 226, 226);

                doc.roundedRect(
                    margin + 4,
                    y,
                    32,
                    8,
                    2,
                    2,
                    "F"
                );

                doc.setTextColor(220, 38, 38);

                doc.setFontSize(10);

                doc.setFont(undefined, "bold");

                doc.text(
                    "INCORRECT",
                    margin + 7,
                    y + 5
                );

            }

            y += 18;

        });

        // =========================
        // FOOTER
        // =========================

        const totalPages = doc.internal.getNumberOfPages();

        for (let i = 1; i <= totalPages; i++) {

            doc.setPage(i);

            doc.setFontSize(10);

            doc.setTextColor(100);

            doc.text(
                `Page ${i} of ${totalPages}`,
                pageWidth - 35,
                pageHeight - 10
            );
        }

        // =========================
        // PDF -> BASE64
        // =========================

        const pdfBlob = doc.output("blob");

        const reader = new FileReader();

        reader.readAsDataURL(pdfBlob);

        reader.onloadend = async function () {

            const base64data =
            reader.result.split(",")[1];

            const response = await fetch(SCRIPT_URL, {

                method: "POST",

                headers: {
                    "Content-Type": "text/plain"
                },

                body: JSON.stringify({
                    pdfBase64: base64data,
                    score: score.toFixed(2)
                })

            });

            const result = await response.json();

            if (result.success) {

                btn.innerText =
                "Report Sent Successfully";

                alert(
                    "PDF Report Sent Successfully! check your Email😊"
                );

            } else {

                console.error(result);

                btn.innerText =
                "Failed To Send";

                alert(
                    "Failed to send report."
                );
            }

        };

    } catch (err) {

        console.error(err);

        btn.innerText = "Error";

        alert("Something went wrong.");
    }
}


</script>

</body>
</html>
